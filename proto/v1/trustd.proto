// gRPC service definition for trustd.
// trustd runs inside a TDX Confidential VM and bridges kernel
// IMA container measurements to the host-side virt-handler via vsock.

syntax = "proto3";

package trustd.v1;

option go_package = "github.com/trustfncall/trustd/proto/v1;trustdv1";

// Trustd is the gRPC service exposed by the in-guest daemon over vsock.
// virt-handler on the host connects to this service to collect attestation
// evidence from containers running inside the CVM.
service Trustd {
  // AttestContainer performs atomic attestation of a single container.
  // Returns RTMR3, measurement log, and optional TD Quote.
  rpc AttestContainer(AttestContainerRequest) returns (AttestContainerResponse);

  // ListContainers returns all tracked containers and their current state.
  rpc ListContainers(ListContainersRequest) returns (ListContainersResponse);

  // GetContainerState returns the current state of a specific container.
  rpc GetContainerState(GetContainerStateRequest) returns (ContainerState);

  // WatchContainerEvents streams real-time container events (measurements,
  // liveness heartbeats, heartbeat misses) to the caller.
  rpc WatchContainerEvents(WatchEventsRequest) returns (stream ContainerEvent);

  // GetTDQuote requests a TDX TD Quote for given reportdata.
  // Uses the TSM configfs interface in the kernel.
  rpc GetTDQuote(GetTDQuoteRequest) returns (GetTDQuoteResponse);

  // Ping checks daemon liveness.
  rpc Ping(PingRequest) returns (PingResponse);

  // StartHeartbeatMonitor enables heartbeat timeout detection for a container.
  // Heartbeats are reported explicitly via ReportHeartbeat.
  rpc StartHeartbeatMonitor(HeartbeatMonitorRequest) returns (HeartbeatMonitorResponse);

  // StopHeartbeatMonitor disables heartbeat timeout detection for a container.
  rpc StopHeartbeatMonitor(HeartbeatMonitorStopRequest) returns (HeartbeatMonitorStopResponse);

  // ReportHeartbeat reports one liveness heartbeat for a container.
  rpc ReportHeartbeat(HeartbeatReportRequest) returns (HeartbeatReportResponse);

  // RestartContainer requests in-guest remediation by restarting processes
  // in the container cgroup. A follow-up measurement event should be emitted
  // by the kernel once the container runtime recreates the container.
  rpc RestartContainer(GetContainerStateRequest) returns (ContainerState);

  // ---- Container lifecycle management (kata-agent-like) ----
  //
  // These RPCs make trustd the single in-guest authority for container
  // lifecycle: the host (virt-handler) tells trustd WHAT to run, and
  // trustd manages the container runtime (Docker/containerd) inside the
  // CVM. This replaces the earlier cloud-init-based container start path.

  // StartContainer creates and starts a container from an image that is
  // already present in the guest's container runtime store. trustd stores
  // the spec so remediation can recreate the container from scratch.
  rpc StartContainer(StartContainerRequest) returns (StartContainerResponse);

  // StopContainer stops and removes a running container.
  rpc StopContainer(StopContainerRequest) returns (StopContainerResponse);

  // ListRunningContainers returns containers currently managed by trustd's
  // lifecycle layer (not all containers on the system — only the ones
  // started via StartContainer).
  rpc ListRunningContainers(ListRunningRequest) returns (ListRunningResponse);
}

// AttestContainerRequest triggers attestation of a specific container.
message AttestContainerRequest {
  // Container identifier (cgroup path inside the CVM).
  string cgroup_path = 1;

  // Nonce from the verifier (hex-encoded). Binds attestation to challenge.
  string nonce_hex = 2;

  // Whether to include a TD Quote in the response.
  bool include_td_quote = 3;
}

// AttestContainerResponse contains the attestation evidence for one container.
message AttestContainerResponse {
  // Container cgroup path.
  string cgroup_path = 1;

  // Current RTMR3 value (hex-encoded, 96 chars for SHA-384).
  string rtmr3 = 2;

  // Initial RTMR3 value at container creation (hex-encoded).
  string initial_rtmr3 = 3;

  // Number of measurements extended into RTMR3.
  int64 measurement_count = 4;

  // Individual measurement log entries.
  repeated ContainerMeasurement measurements = 5;

  // Reportdata = SHA384(nonce || rtmr3), hex-encoded.
  string report_data = 6;

  // Nonce echo (hex-encoded).
  string nonce = 7;

  // Optional: TDX TD Quote (binary, base64-encoded).
  // Only present if include_td_quote was true in the request.
  bytes td_quote = 8;

  // Timestamp of the attestation (seconds since epoch).
  int64 timestamp = 9;
}

// ContainerMeasurement represents a single file measurement.
message ContainerMeasurement {
  // SHA-384 digest of the measured file (hex-encoded).
  string digest = 1;

  // Path of the measured file.
  string file = 2;
}

// ListContainersRequest lists all tracked containers.
message ListContainersRequest {}

// ListContainersResponse contains all tracked container states.
message ListContainersResponse {
  repeated ContainerState containers = 1;
}

// GetContainerStateRequest queries a specific container.
message GetContainerStateRequest {
  string cgroup_path = 1;
}

// ContainerPhase tracks where a lifecycle-managed container is in its
// state machine. Containers discovered passively by the securityfs
// watcher (not started via StartContainer) remain at PHASE_UNMANAGED.
enum ContainerPhase {
  CONTAINER_PHASE_UNMANAGED = 0;   // legacy: not started via StartContainer
  CONTAINER_PHASE_PENDING = 1;     // StartContainer received, not yet created
  CONTAINER_PHASE_RUNNING = 2;     // container process is running, IMA measured
  CONTAINER_PHASE_READY = 3;       // [TRUSTWEAVE_READY] detected on stdout
  CONTAINER_PHASE_TRUSTED = 4;     // attestation-service returned TRUSTED
  CONTAINER_PHASE_UNTRUSTED = 5;   // attestation failed after measurement change
  CONTAINER_PHASE_REMEDIATING = 6; // stop + remove + recreate in progress
  CONTAINER_PHASE_STOPPED = 7;     // StopContainer completed
  CONTAINER_PHASE_FAILED = 8;      // start or remediation failed
}

// ContainerState represents the current state of a tracked container.
message ContainerState {
  string cgroup_path = 1;
  string rtmr3 = 2;
  string initial_rtmr3 = 3;
  int64 measurement_count = 4;
  int64 last_heartbeat = 5;       // seconds since epoch, 0 if never
  int64 heartbeat_count = 6;
  bool heartbeat_monitoring = 7;

  // Lifecycle fields (populated only for containers started via StartContainer).
  ContainerPhase phase = 10;
  string container_name = 11;     // Docker/containerd name (empty for unmanaged)
  string container_id = 12;       // Docker/containerd ID (empty for unmanaged)
}

// WatchEventsRequest subscribes to container events.
message WatchEventsRequest {
  // Optional: filter to specific event types. Empty = all events.
  repeated EventType event_types = 1;

  // Optional: filter to specific cgroup path. Empty = all containers.
  string cgroup_path = 2;
}

// EventType mirrors the kernel's IMA_CN_EVENT_* constants plus lifecycle events.
enum EventType {
  EVENT_TYPE_UNSPECIFIED = 0;
  EVENT_TYPE_NEW = 1;
  EVENT_TYPE_MEASUREMENT = 2;
  EVENT_TYPE_HEARTBEAT = 3;
  EVENT_TYPE_HEARTBEAT_MISS = 4;
  EVENT_TYPE_REMOVED = 5;
  EVENT_TYPE_ATTEST_BEGIN = 6;
  EVENT_TYPE_ATTEST_END = 7;
  // Lifecycle events (emitted by the lifecycle manager, not the kernel):
  EVENT_TYPE_READY = 8;           // [TRUSTWEAVE_READY] detected on container stdout
  EVENT_TYPE_PHASE_CHANGE = 9;    // container phase transitioned (see ContainerPhase)
}

// ContainerEvent is streamed to subscribers.
message ContainerEvent {
  EventType event_type = 1;
  string cgroup_path = 2;
  int64 timestamp = 3;

  // For MEASUREMENT events:
  string digest = 4;
  string filename = 5;

  // For HEARTBEAT_MISS:
  string detail = 6;

  // Current RTMR3 at event time (hex):
  string rtmr3 = 7;
  int64 measurement_count = 8;

  // For PHASE_CHANGE and READY events:
  ContainerPhase phase = 9;
  string container_name = 10;
}

// GetTDQuoteRequest asks trustd to obtain a TD Quote.
message GetTDQuoteRequest {
  // Report data to include in the quote (64 bytes, base64-encoded).
  bytes report_data = 1;
}

// GetTDQuoteResponse contains the TD Quote.
message GetTDQuoteResponse {
  // TDX TD Quote (binary).
  bytes td_quote = 1;
}

// PingRequest is a liveness check.
message PingRequest {}

// PingResponse confirms the agent is alive.
message PingResponse {
  string version = 1;
  int64 uptime_seconds = 2;
  int64 containers_tracked = 3;
}

// HeartbeatMonitorRequest enables heartbeat timeout detection.
message HeartbeatMonitorRequest {
  string cgroup_path = 1;
  uint32 timeout_seconds = 2;  // 0 = use kernel default (90s)
}

// HeartbeatMonitorResponse confirms monitoring was started.
message HeartbeatMonitorResponse {}

// HeartbeatMonitorStopRequest disables heartbeat monitoring.
message HeartbeatMonitorStopRequest {
  string cgroup_path = 1;
}

// HeartbeatMonitorStopResponse confirms monitoring was stopped.
message HeartbeatMonitorStopResponse {}

// HeartbeatReportRequest reports one liveness heartbeat for a container.
message HeartbeatReportRequest {
  string cgroup_path = 1;
}

// HeartbeatReportResponse confirms heartbeat ingestion.
message HeartbeatReportResponse {}

// ---- Container lifecycle messages ----

// RemediationMode controls how RestartContainer behaves for lifecycle-
// managed containers. For unmanaged (legacy) containers, the mode is
// always SIGNAL regardless of what the caller requests.
enum RemediationMode {
  REMEDIATION_MODE_SIGNAL = 0;    // existing: SIGTERM/SIGKILL cgroup PIDs
  REMEDIATION_MODE_RECREATE = 1;  // stop + remove + create from stored spec
  REMEDIATION_MODE_KILL = 2;      // stop + remove, no restart
}

message StartContainerRequest {
  string name = 1;                    // container name (trustweave-mcp-0, etc.)
  string image = 2;                   // OCI image ref (must be pre-staged in guest)
  repeated string env = 3;            // KEY=VALUE pairs
  repeated int32 ports = 4;           // ports the container listens on (for ready detection)
  bool network_host = 5;              // --network host
  map<string, string> labels = 6;     // optional labels
  string ready_marker = 7;            // substring to match on stdout for READY (default: TRUSTWEAVE_READY)
}

message StartContainerResponse {
  string cgroup_path = 1;             // resolved cgroup after start (may be empty if pending)
  string container_id = 2;            // Docker/containerd container ID
  bool started = 3;
  string error = 4;
  ContainerPhase phase = 5;           // current phase after start attempt
}

message StopContainerRequest {
  string name = 1;                    // stop by name
  string cgroup_path = 2;             // or by cgroup (for remediation path)
  int32 timeout_seconds = 3;          // grace period before SIGKILL (default: 10)
}

message StopContainerResponse {
  bool stopped = 1;
  string error = 2;
}

message ListRunningRequest {}

message ListRunningResponse {
  repeated ManagedContainer containers = 1;
}

// ManagedContainer is a container started via StartContainer.
message ManagedContainer {
  string name = 1;
  string image = 2;
  string cgroup_path = 3;
  string container_id = 4;
  ContainerPhase phase = 5;
  int64 started_at = 6;              // unix epoch seconds
  repeated int32 ports = 7;
}
